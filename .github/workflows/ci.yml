name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  build-lint-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Lint JavaScript
        run: npm run lint:js

      - name: Lint HTML
        run: npm run lint:html

      - name: Lint PHP files
        run: |
          set -e
          php -v
          files=$(git ls-files '*.php')
          if [ -z "$files" ]; then
            echo "No PHP files to lint"
            exit 0
          fi
          for f in $files; do
            echo "Linting $f"
            php -l "$f"
          done

      - name: Run smoke tests
        run: npm run test:smoke

      - name: Run JS unit tests
        run: npm run test:unit

      - name: Run PHP functional tests
        run: npm run test:functional
