<!DOCTYPE html>
<html lang="pl">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <meta name="description" content="Password validation form">
  <meta name="author" content="">
  <title>Formularz walidacji</title>

  <link href="vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/clean-blog.min.css" rel="stylesheet">
</head>

<body style="background-image: url('img/background.jfif'); background-size: cover; min-height: 100vh;">
  <div class="container py-5">
    <div class="row">
      <div class="col-12 col-md-8 col-lg-6 mx-auto">
        <div class="card shadow">
          <div class="card-body">
            <h2 class="h4 mb-3">Weryfikacja danych</h2>
            <p class="text-muted mb-4">Uzupelnij wymagane pola: pws, srt, fName.</p>

            <form action="pass_accept.php" method="post">
              <div class="form-group mb-3">
                <label for="pws">pws (haslo)</label>
                <input id="pws" name="pws" type="password" class="form-control" maxlength="32" required autocomplete="off">
              </div>

              <div class="form-group mb-3">
                <label for="srt">srt (sekret)</label>
                <input id="srt" name="srt" type="text" class="form-control" inputmode="numeric" pattern="[0-9]{4}" maxlength="4" required>
              </div>

              <div class="form-group mb-4">
                <label for="fName">fName (imie)</label>
                <input id="fName" name="fName" type="text" class="form-control" maxlength="50" pattern="[A-Za-zÀ-ž'\- ]{1,50}" required>
              </div>

              <button type="submit" class="btn btn-primary">Wyslij</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
  <script src="vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
</body>

</html>
